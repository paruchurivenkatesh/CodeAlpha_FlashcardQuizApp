<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Flashcard Quiz App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Animated Circles -->

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>

    <!-- Main Container -->

    <div class="container">

        <h1>
    <span class="brain">🧠</span>
    Flashcard Quiz App
</h1>

        <!-- Flashcard -->

        <div class="flashcard" id="flashcard">

            <div class="front">

                <h2 id="question"></h2>

            </div>

            <div class="back">

                <h2 id="answer"></h2>

            </div>

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <button id="flipBtn">
                Show Answer
            </button>

            <button id="prevBtn">
                Previous
            </button>

            <button id="nextBtn">
                Next
            </button>

        </div>

        <!-- Add Section -->

        <div class="add-section">

            <input type="text"
                   id="newQuestion"
                   placeholder="Enter Question">

            <input type="text"
                   id="newAnswer"
                   placeholder="Enter Answer">

            <button id="addBtn">
                Add Flashcard
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
